<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheKing - 进入</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
        }

        /* Spline 全屏 */
        #spline-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        spline-viewer {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 顶部文字 */
        .top-hint {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* 灯泡形状按钮 */
        .bulb-btn {
            position: fixed;
            top: 18%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;

            width: 60px;
            height: 90px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            animation: breathe 3s ease-in-out infinite;
            transition: all 0.3s ease;
        }

        .bulb-btn:hover {
            animation: none;
            transform: translateX(-50%) scale(1.1);
        }

        /* 灯泡玻璃部分 */
        .bulb-glass {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #fff 0%, #ffeb3b 30%, #ff9800 70%, #e65100 100%);
            box-shadow: 
                0 0 20px rgba(255, 235, 59, 0.6),
                0 0 40px rgba(255, 152, 0, 0.4),
                inset -5px -5px 15px rgba(0,0,0,0.2),
                inset 5px 5px 15px rgba(255,255,255,0.3);
            position: relative;
            transition: all 0.3s ease;
        }

        .bulb-btn:hover .bulb-glass {
            box-shadow: 
                0 0 30px rgba(255, 235, 59, 0.9),
                0 0 60px rgba(255, 152, 0, 0.6),
                0 0 100px rgba(255, 152, 0, 0.3),
                inset -5px -5px 15px rgba(0,0,0,0.2),
                inset 5px 5px 15px rgba(255,255,255,0.4);
        }

        /* 灯泡螺纹底座 */
        .bulb-base {
            width: 28px;
            height: 8px;
            background: linear-gradient(to bottom, #888, #555);
            border-radius: 2px;
            margin: 2px auto 0;
            position: relative;
        }

        .bulb-base::before {
            content: '';
            position: absolute;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 6px;
            background: linear-gradient(to bottom, #aaa, #777);
            border-radius: 2px;
        }

        .bulb-base::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 6px;
            background: linear-gradient(to bottom, #666, #444);
            border-radius: 0 0 4px 4px;
        }

        /* 灯泡高光 */
        .bulb-glass::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 15px;
            width: 18px;
            height: 12px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            transform: rotate(-30deg);
        }

        /* 呼吸动画 */
        @keyframes breathe {
            0%, 100% {
                transform: translateX(-50%) scale(1);
                opacity: 0.85;
            }
            50% {
                transform: translateX(-50%) scale(1.08);
                opacity: 1;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- Spline 3D 场景 -->
    <div id="spline-container">
        <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.90/build/spline-viewer.js"></script>
        <spline-viewer url="https://prod.spline.design/k9qGy-LVSQIB9Fnz/scene.splinecode"></spline-viewer>
    </div>

    <!-- 顶部提示 -->
    <div class="top-hint">THEKING FITNESS</div>

    <!-- 灯泡按钮 -->
    <a href="home.html" class="bulb-btn">
        <div class="bulb-glass"></div>
        <div class="bulb-base"></div>
    </a>
</body>
</html>
